<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="css.css" />
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    <div class="choices">
      <div class="choice" id="rock">
        <img src="https://www.clipartmax.com/png/small/406-4069955_rock-paper-scissors-rock-paper-scissors.png" />
      </div>
      <div class="choice" id="paper">
        <img src="https://www.clipartmax.com/png/small/428-4288895_rock-paper-scissors-sign.png"/>
      </div>
      <div class="choice" id="scissors">
        <img src="https://www.clipartmax.com/png/small/428-4288836_your-hand-hand-clipart-png-rock-paper-scissors.png"/>
      </div>
    </div>

    <div class="score-board">
      <div class="score">
        <p id="user-score">0</p>
        <p>You</p>
      </div>
      <div class="score">
        <p id="comp-score">0</p>
        <p>Computer</p>
      </div>
    </div>

    <div class="msg-container">
      <p id="msg">Play your move</p>
    </div>
    <script src="javascript.js"></script>
  </body>
</html>
